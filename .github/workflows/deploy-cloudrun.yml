name: Deploy to Cloud Run

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  PROJECT_ID: gen-lang-client-0565298632
  SERVICE_NAME: iacp-3-0
  REGION: us-central1
  REGISTRY_LOCATION: us

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          service_account_key: ${{ secrets.GCP_SA_KEY }}
          project_id: ${{ env.PROJECT_ID }}

      - name: Configure Docker for Artifact Registry
        run: |
          gcloud auth configure-docker ${REGISTRY_LOCATION}-docker.pkg.dev --quiet

      - name: Build Docker image
        run: |
          docker build -t ${REGISTRY_LOCATION}-docker.pkg.dev/${PROJECT_ID}/gcr.io/${SERVICE_NAME}:${GITHUB_SHA} .

      - name: Push to Artifact Registry
        run: |
          docker push ${REGISTRY_LOCATION}-docker.pkg.dev/${PROJECT_ID}/gcr.io/${SERVICE_NAME}:${GITHUB_SHA}

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy ${SERVICE_NAME} \
            --image ${REGISTRY_LOCATION}-docker.pkg.dev/${PROJECT_ID}/gcr.io/${SERVICE_NAME}:${GITHUB_SHA} \
            --region ${REGION} \
            --platform managed \
            --allow-unauthenticated \
            --memory 512Mi \
            --cpu 1 \
            --concurrency 80 \
            --timeout 300 \
            --min-instances 0 \
            --max-instances 5 \
            --set-env-vars GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}

      - name: Output Service URL
        run: |
          URL=$(gcloud run services describe ${SERVICE_NAME} --region ${REGION} --format 'value(status.url)')
          echo "Deployment Successful!"
          echo "================================================"
          echo "Service: ${SERVICE_NAME}"
          echo "Region: ${REGION}"
          echo "Project: ${PROJECT_ID}"
          echo "URL: ${URL}"
