# Aider Configuration for IACP 3.0

# Use Qwen API (Alibaba) instead of Groq
# Get API key from: https://dashscope.console.aliyun.com/

model: qwen-plus
api-key: env:ALIBABA_API_KEY

# Auto-approve changes
yes-always: true

# Don't auto-commit (we'll review first)
auto-commits: false

# Disable map to save tokens
map-tokens: 0

# Enable caching
cache-prompts: true

# Read context from files
read:
  - todo.md
  - database/schema.sql
  - src/services/api.ts
  - docs/EXISTING_COMPONENTS_INVENTORY.md
